services:
  # Backend API
  - type: web
    name: sevasetu-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python seed_data.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - fromGroup: sevasetu-env-vars

  # Landing Page
  - type: web
    name: sevasetu-landing
    runtime: static
    rootDir: landing_page
    buildCommand: npm install && npm run build
    staticPublishPath: dist

  # Volunteer App
  - type: web
    name: sevasetu-volunteer
    runtime: static
    rootDir: volunteer-app
    buildCommand: npm install && npm run build
    staticPublishPath: dist

  # Admin Dashboard
  - type: web
    name: sevasetu-admin
    runtime: static
    rootDir: admin-dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
